<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Second Brain — 3D View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07070f;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;}
#c{display:block;width:100vw;height:100vh;}
#ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;}
#topbar{position:absolute;top:0;left:0;right:0;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;}
#topbar h1{font-size:12px;font-weight:600;color:#666;letter-spacing:.14em;text-transform:uppercase;}
#topbar a{color:#444;text-decoration:none;font-size:12px;pointer-events:all;transition:color .2s;}
#topbar a:hover{color:#aaa;}
#filters{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:all;}
.fbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:5px 14px;font-size:11px;color:#777;cursor:pointer;transition:all .2s;letter-spacing:.06em;font-family:inherit;}
.fbtn:hover{background:rgba(255,255,255,.10);color:#ccc;}
.fbtn.active{color:#fff;border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.12);}
#panel{position:absolute;top:50%;right:24px;transform:translateY(-50%);width:220px;background:rgba(8,8,18,.94);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:18px 18px 16px;backdrop-filter:blur(16px);opacity:0;transition:opacity .25s;pointer-events:none;}
#panel.show{opacity:1;pointer-events:all;}
#panel .p-close{position:absolute;top:10px;right:14px;font-size:18px;color:#444;cursor:pointer;line-height:1;}
#panel .p-close:hover{color:#aaa;}
#panel .p-lobe{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:6px;}
#panel .p-title{font-size:15px;font-weight:600;color:#e4e4ff;margin-bottom:5px;line-height:1.3;}
#panel .p-meta{font-size:11px;color:#555;margin-bottom:10px;}
#panel .p-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
#panel .p-tag{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid #222;color:#777;}
#panel .p-link{font-size:11px;color:#7866d4;cursor:pointer;}
#panel .p-link:hover{color:#aa99ff;}
#hint{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);font-size:10px;color:#333;letter-spacing:.08em;white-space:nowrap;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="topbar">
    <h1>Second Brain · 3D</h1>
    <a href="index.html">← Manager</a>
  </div>
  <div id="panel">
    <span class="p-close" id="panelClose">×</span>
    <div class="p-lobe" id="pLobe"></div>
    <div class="p-title" id="pTitle"></div>
    <div class="p-meta" id="pMeta"></div>
    <div class="p-tags" id="pTags"></div>
    <div class="p-link">↗ open in manager</div>
  </div>
  <div id="filters">
    <button class="fbtn active" data-lobe="all">All</button>
    <button class="fbtn" data-lobe="work">Work</button>
    <button class="fbtn" data-lobe="personal">Personal</button>
    <button class="fbtn" data-lobe="family">Family</button>
    <button class="fbtn" data-lobe="leisure">Leisure</button>
    <button class="fbtn" data-lobe="core">Core</button>
  </div>
  <div id="hint">drag to orbit · scroll to zoom · click nodes</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────
const BR = 10;

const LOBES = {
  work:    {color:0x7866d4,rgb:[120,102,212],activation:.85,phase:0.0,
             seeds:[[.70,.20,.50],[.50,-.20,.80],[.80,.50,.10],[.30,.40,.70]]},
  personal:{color:0x2fba8a,rgb:[47,186,138], activation:.55,phase:1.1,
             seeds:[[-.60,.30,.50],[-.50,.50,.40],[-.70,.00,.45]]},
  family:  {color:0xe0704a,rgb:[224,112,74],  activation:.38,phase:2.3,
             seeds:[[.40,-.60,.40],[.65,-.38,-.22]]},
  leisure: {color:0x4a9fe0,rgb:[74,159,224],  activation:.32,phase:3.7,
             seeds:[[-.40,-.58,.32],[-.52,-.42,-.32]]},
  core:    {color:0xb0a8ff,rgb:[176,168,255], activation:.72,phase:0.8,
             seeds:[[-.08,.55,-.72]]}
};
const LOBE_NAMES = Object.keys(LOBES);

function norm(v){const l=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])||1;return[v[0]/l,v[1]/l,v[2]/l];}
function avgNorm(seeds){const s=[0,0,0];seeds.forEach(v=>{s[0]+=v[0];s[1]+=v[1];s[2]+=v[2];});return norm([s[0]/seeds.length,s[1]/seeds.length,s[2]/seeds.length]);}

for(const n of LOBE_NAMES){
  LOBES[n].seedsNorm = LOBES[n].seeds.map(norm);
  LOBES[n].centroid  = avgNorm(LOBES[n].seeds);
}

// ─────────────────────────────────────────────────────────────────
// ENTRIES
// ─────────────────────────────────────────────────────────────────
const RINGS=[
  {label:'2d',r:.965},{label:'1w',r:.905},{label:'3w',r:.840},
  {label:'2mo',r:.755},{label:'4mo',r:.650},{label:'8mo',r:.525},
  {label:'1.5yr',r:.390},{label:'4yr',r:.250},{label:'10yr+',r:.115}
];
const PALPHA={evergreen:1.0,slow:.72,fast:.42,single_use:.22};
const PSIZE ={evergreen:.26,slow:.20,fast:.16,single_use:.13};

const ENTRIES=[
  {name:'Anniversary Trip',      space:'leisure', ring:0,type:'single_use'},
  {name:'Shanghai Masters',      space:'leisure', ring:0,type:'single_use'},
  {name:'Coca-Cola Outcome',     space:'work',    ring:1,type:'fast'},
  {name:'Motorcycle Choice',     space:'personal',ring:1,type:'slow'},
  {name:'BMW COE',               space:'personal',ring:2,type:'fast'},
  {name:'Cost of Living',        space:'personal',ring:2,type:'slow'},
  {name:'South Korea',           space:'leisure', ring:2,type:'fast'},
  {name:'Career Transition',     space:'work',    ring:2,type:'slow'},
  {name:'Second Brain Security', space:'core',    ring:2,type:'slow'},
  {name:'Weekly Codex Scan',     space:'core',    ring:2,type:'fast'},
  {name:'100 Ideas',             space:'personal',ring:3,type:'slow'},
  {name:'Technical Environment', space:'work',    ring:3,type:'slow'},
  {name:'Local LLM',             space:'work',    ring:3,type:'slow'},
  {name:'Cheryl',                space:'personal',ring:3,type:'evergreen'},
  {name:'Ryan',                  space:'family',  ring:3,type:'slow'},
  {name:'Jake',                  space:'family',  ring:3,type:'slow'},
  {name:'InspectPro',            space:'work',    ring:4,type:'slow'},
  {name:'SplitLah',              space:'work',    ring:4,type:'slow'},
  {name:'CV Design',             space:'work',    ring:4,type:'fast'},
  {name:'Evenings Out',          space:'leisure', ring:4,type:'fast'},
  {name:'Motorcycle Touring',    space:'leisure', ring:4,type:'slow'},
  {name:'Music',                 space:'leisure', ring:4,type:'slow'},
  {name:'EnigmaPrint',           space:'work',    ring:4,type:'slow'},
  {name:'Health',                space:'personal',ring:4,type:'evergreen'},
  {name:'How I Build',           space:'work',    ring:5,type:'evergreen'},
  {name:'MetrIQ',                space:'work',    ring:5,type:'slow'},
  {name:'FM Industry',           space:'work',    ring:5,type:'slow'},
  {name:'On Investments',        space:'personal',ring:5,type:'slow'},
  {name:'How I Roll',            space:'personal',ring:5,type:'evergreen'},
  {name:'Travel',                space:'leisure', ring:5,type:'slow'},
  {name:'Inner Circle A',        space:'personal',ring:5,type:'evergreen'},
  {name:'Inner Circle B',        space:'personal',ring:5,type:'evergreen'},
  {name:'Personal Working Style',space:'work',    ring:5,type:'evergreen'},
  {name:'Mapletree VP',          space:'work',    ring:6,type:'slow'},
  {name:'Mount Kinabalu',        space:'leisure', ring:6,type:'slow'},
  {name:'Career Arc',            space:'core',    ring:8,type:'evergreen'},
  {name:'Core Values',           space:'core',    ring:8,type:'evergreen'}
];

// ─────────────────────────────────────────────────────────────────
// RENDERER + SCENE + CAMERA
// ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x07070f, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, .1, 300);
camera.position.set(0, 0, 28);

scene.add(new THREE.AmbientLight(0xffffff, .5));
const pt = new THREE.PointLight(0x8866ff, .6, 80);
pt.position.set(10, 10, 15);
scene.add(pt);

// ─────────────────────────────────────────────────────────────────
// SMOOTH LOBE SHELL — custom shader with soft Voronoi blending
// ─────────────────────────────────────────────────────────────────
// Build flat seed + color arrays for the shader
const allSeeds  = [];
const allColors = [];
for(const name of LOBE_NAMES){
  const L = LOBES[name];
  const c = new THREE.Color(L.color);
  for(const s of L.seedsNorm){
    allSeeds.push(new THREE.Vector3(s[0], s[1], s[2]));
    allColors.push(new THREE.Vector3(c.r, c.g, c.b));
  }
}
const NS = allSeeds.length; // 12

const shellMat = new THREE.ShaderMaterial({
  uniforms:{
    seeds:     {value: allSeeds},
    seedColors:{value: allColors},
    filterOpacity:{value: 1.0}
  },
  vertexShader:`
    varying vec3 vPos;
    varying vec3 vNorm;
    void main(){
      vPos  = normalize(position);
      vNorm = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader:`
    #define NS ${NS}
    uniform vec3  seeds[NS];
    uniform vec3  seedColors[NS];
    uniform float filterOpacity;
    varying vec3 vPos;
    varying vec3 vNorm;
    void main(){
      vec3  dir    = normalize(vPos);
      float wts[NS];
      float total  = 0.0;
      for(int i=0;i<NS;i++){
        float d = 1.0 - clamp(dot(dir, normalize(seeds[i])), -1.0, 1.0);
        float w = exp(-8.0 * d * d);
        wts[i]  = w;
        total  += w;
      }
      vec3 col = vec3(0.0);
      for(int i=0;i<NS;i++) col += (wts[i]/total) * seedColors[i];

      // rim lighting: brighter near silhouette edge
      vec3  viewDir = normalize(vec3(0.0,0.0,1.0));
      float rim     = 1.0 - abs(dot(vNorm, viewDir));
      float alpha   = (0.05 + rim * 0.12) * filterOpacity;
      gl_FragColor  = vec4(col * (0.5 + rim * 0.8), alpha);
    }
  `,
  transparent:true,
  side:THREE.DoubleSide,
  depthWrite:false,
});

const shell = new THREE.Mesh(new THREE.SphereGeometry(BR, 128, 64), shellMat);
scene.add(shell);

// Faint outer glow ring
const edgeMesh = new THREE.Mesh(
  new THREE.SphereGeometry(BR * 1.018, 64, 32),
  new THREE.MeshBasicMaterial({color:0x3333aa, transparent:true, opacity:.12, side:THREE.BackSide})
);
scene.add(edgeMesh);

// ─────────────────────────────────────────────────────────────────
// LOBE GLOW VOLUMES — large additive sprites that breathe
// ─────────────────────────────────────────────────────────────────
function makeGlowTex(r,g,b){
  const sz=256, cv=document.createElement('canvas');
  cv.width=sz; cv.height=sz;
  const ctx=cv.getContext('2d');
  const gr=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  gr.addColorStop(0,  `rgba(${r},${g},${b},0.90)`);
  gr.addColorStop(.35,`rgba(${r},${g},${b},0.40)`);
  gr.addColorStop(.65,`rgba(${r},${g},${b},0.12)`);
  gr.addColorStop(1,  `rgba(${r},${g},${b},0.00)`);
  ctx.fillStyle=gr; ctx.fillRect(0,0,sz,sz);
  return new THREE.CanvasTexture(cv);
}

const lobeSprites = {};
for(const name of LOBE_NAMES){
  const L = LOBES[name];
  const mat = new THREE.SpriteMaterial({
    map:       makeGlowTex(...L.rgb),
    transparent:true,
    blending:  THREE.AdditiveBlending,
    depthWrite:false,
    opacity:   0.50 + L.activation * .22
  });
  const sp = new THREE.Sprite(mat);
  const c  = L.centroid;
  const r  = BR * (0.42 + L.activation * .14);
  sp.position.set(c[0]*r, c[1]*r, c[2]*r);
  const sz = BR * (1.5 + L.activation * .5);
  sp.scale.setScalar(sz);
  sp._baseSize    = sz;
  sp._baseOpacity = 0.50 + L.activation * .22;
  sp._speed       = 2*Math.PI / (2.5 + (1-L.activation) * 5.5); // 2.5–8s
  sp._phase       = L.phase;
  lobeSprites[name] = sp;
  scene.add(sp);
}

// ─────────────────────────────────────────────────────────────────
// DEPTH RINGS
// ─────────────────────────────────────────────────────────────────
for(let i=0;i<RINGS.length;i++){
  const mat = new THREE.MeshBasicMaterial({
    wireframe:true, transparent:true, depthWrite:false, color:0xffffff,
    opacity: i===0?.055 : i<3?.035 : .018
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(RINGS[i].r*BR,48,24), mat));
}

// ─────────────────────────────────────────────────────────────────
// NODE SPRITES + RAYCASTING MESHES
// ─────────────────────────────────────────────────────────────────
function makeNodeTex(r,g,b){
  const sz=64, cv=document.createElement('canvas');
  cv.width=sz; cv.height=sz;
  const ctx=cv.getContext('2d');
  const gr=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  gr.addColorStop(0,  `rgba(${r},${g},${b},1.0)`);
  gr.addColorStop(.25,`rgba(${r},${g},${b},0.7)`);
  gr.addColorStop(.6, `rgba(${r},${g},${b},0.2)`);
  gr.addColorStop(1,  `rgba(${r},${g},${b},0.0)`);
  ctx.fillStyle=gr; ctx.fillRect(0,0,sz,sz);
  return new THREE.CanvasTexture(cv);
}

function hash(n){let x=n^(n>>>16);x=Math.imul(x,0x45d9f3b);x^=x>>>16;return(x>>>0)/4294967295;}
function coneDir(seed,deg,idx){
  const th=Math.acos(1-hash(idx*7+1)*(1-Math.cos(deg*Math.PI/180)));
  const ph=hash(idx*13+3)*2*Math.PI;
  const st=Math.sin(th),ct=Math.cos(th),sp2=Math.sin(ph),cp=Math.cos(ph);
  const[sx,sy,sz]=seed;
  const ax=Math.abs(sx)<.9?0:1, ay=Math.abs(sx)<.9?1:0;
  const tx=sy*0-sz*ay, ty=sz*ax-sx*0, tz=sx*ay-sy*ax;
  const tl=Math.sqrt(tx*tx+ty*ty+tz*tz)||1;
  const ttx=tx/tl,tty=ty/tl,ttz=tz/tl;
  const bx=sy*ttz-sz*tty, by=sz*ttx-sx*ttz, bz=sx*tty-sy*ttx;
  return norm([ttx*st*cp+bx*st*sp2+sx*ct, tty*st*cp+by*st*sp2+sy*ct, ttz*st*cp+bz*st*sp2+sz*ct]);
}

const nodeMeshes = [];
const nodeTex = {};
for(const n of LOBE_NAMES) nodeTex[n] = makeNodeTex(...LOBES[n].rgb);

let globalIdx = 0;
for(const name of LOBE_NAMES){
  const L = LOBES[name];
  ENTRIES.filter(e=>e.space===name).forEach((e, i)=>{
    const seed  = L.seedsNorm[i % L.seedsNorm.length];
    const dir   = coneDir(seed, 28, globalIdx++);
    const r     = RINGS[e.ring].r * BR;
    const alpha = PALPHA[e.type];
    const sz    = PSIZE[e.type];

    // Glow sprite
    const gMat = new THREE.SpriteMaterial({
      map: nodeTex[name], transparent:true,
      blending:THREE.AdditiveBlending, depthWrite:false, opacity:alpha
    });
    const gSp = new THREE.Sprite(gMat);
    gSp.position.set(dir[0]*r, dir[1]*r, dir[2]*r);
    gSp.scale.setScalar(sz * BR);
    scene.add(gSp);

    // Invisible hit mesh
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(sz*.35*BR, 6, 4),
      new THREE.MeshBasicMaterial({visible:false})
    );
    mesh.position.copy(gSp.position);
    mesh.userData = {entry:e, glowMat:gMat, alpha, baseSz:sz*BR, sprite:gSp};
    scene.add(mesh);
    nodeMeshes.push(mesh);
  });
}

// ─────────────────────────────────────────────────────────────────
// LOBE NAME LABELS (always-on sprites)
// ─────────────────────────────────────────────────────────────────
function makeLabelTex(text, hexColor){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=48;
  const ctx=cv.getContext('2d');
  ctx.font='700 11px system-ui';
  ctx.fillStyle=hexColor;
  ctx.globalAlpha=0.82;
  ctx.fillText(text.toUpperCase(), 4, 16);
  return new THREE.CanvasTexture(cv);
}
for(const name of LOBE_NAMES){
  const L=LOBES[name];
  const c=L.centroid;
  const r=BR*0.90;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({
    map:makeLabelTex(name,'#'+new THREE.Color(L.color).getHexString()),
    transparent:true, depthWrite:false
  }));
  sp.position.set(c[0]*r, c[1]*r+.6, c[2]*r);
  sp.scale.set(3.8, .72, 1);
  scene.add(sp);
}

// ─────────────────────────────────────────────────────────────────
// HOVER LABEL
// ─────────────────────────────────────────────────────────────────
const hoverMat = new THREE.SpriteMaterial({transparent:true, depthWrite:false, opacity:0});
const hoverSp  = new THREE.Sprite(hoverMat);
hoverSp.scale.set(5.5, 1.0, 1);
scene.add(hoverSp);

function updateHoverLabel(mesh){
  const e=mesh.userData.entry;
  const cv=document.createElement('canvas'); cv.width=320; cv.height=52;
  const ctx=cv.getContext('2d');
  ctx.font='500 13px system-ui';
  ctx.fillStyle='rgba(210,210,255,0.92)';
  ctx.fillText(e.name, 4, 18);
  ctx.font='10px system-ui';
  ctx.fillStyle='rgba(130,130,165,0.70)';
  ctx.fillText(RINGS[e.ring].label+' ago · '+e.type, 4, 36);
  const tex=new THREE.CanvasTexture(cv);
  if(hoverMat.map) hoverMat.map.dispose();
  hoverMat.map=tex; hoverMat.needsUpdate=true; hoverMat.opacity=1;
  hoverSp.position.copy(mesh.position);
  hoverSp.position.y += 1.6;
}

// ─────────────────────────────────────────────────────────────────
// ORBIT CONTROLS (manual)
// ─────────────────────────────────────────────────────────────────
let isDragging=false, lastX=0, lastY=0;
let rotX=.18, rotY=.0;
let targetZ=28, camZ=28;
let didDrag=false;

canvas.addEventListener('mousedown', e=>{
  isDragging=true; lastX=e.clientX; lastY=e.clientY; didDrag=false;
});
window.addEventListener('mousemove', e=>{
  if(isDragging){
    const dx=e.clientX-lastX, dy=e.clientY-lastY;
    if(Math.abs(dx)+Math.abs(dy)>2) didDrag=true;
    rotY+=dx*.005; rotX+=dy*.005;
    rotX=Math.max(-1.4, Math.min(1.4, rotX));
    lastX=e.clientX; lastY=e.clientY;
  } else {
    // Hover raycasting
    const rect=canvas.getBoundingClientRect();
    const mouse=new THREE.Vector2(
      ((e.clientX-rect.left)/rect.width)*2-1,
      -((e.clientY-rect.top)/rect.height)*2+1
    );
    const ray=new THREE.Raycaster();
    ray.setFromCamera(mouse,camera);
    const hits=ray.intersectObjects(nodeMeshes);
    if(hits.length>0){
      canvas.style.cursor='pointer';
      updateHoverLabel(hits[0].object);
    } else {
      canvas.style.cursor='default';
      hoverMat.opacity=0;
    }
  }
});
window.addEventListener('mouseup', e=>{
  if(isDragging && !didDrag){
    // treat as click
    const rect=canvas.getBoundingClientRect();
    const mouse=new THREE.Vector2(
      ((e.clientX-rect.left)/rect.width)*2-1,
      -((e.clientY-rect.top)/rect.height)*2+1
    );
    const ray=new THREE.Raycaster();
    ray.setFromCamera(mouse,camera);
    const hits=ray.intersectObjects(nodeMeshes);
    if(hits.length>0) openPanel(hits[0].object);
    else closePanel();
  }
  isDragging=false;
});
canvas.addEventListener('wheel', e=>{
  targetZ=Math.max(14,Math.min(50,targetZ+e.deltaY*.04));
},{passive:true});

// Touch support
let lastTouchX=0, lastTouchY=0;
canvas.addEventListener('touchstart', e=>{lastTouchX=e.touches[0].clientX;lastTouchY=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchmove', e=>{
  const dx=e.touches[0].clientX-lastTouchX, dy=e.touches[0].clientY-lastTouchY;
  rotY+=dx*.004; rotX+=dy*.004;
  rotX=Math.max(-1.4,Math.min(1.4,rotX));
  lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
},{passive:true});

// ─────────────────────────────────────────────────────────────────
// PANEL
// ─────────────────────────────────────────────────────────────────
function openPanel(mesh){
  const e=mesh.userData.entry;
  const L=LOBES[e.space];
  document.getElementById('pLobe').textContent=e.space;
  document.getElementById('pLobe').style.color='#'+new THREE.Color(L.color).getHexString();
  document.getElementById('pTitle').textContent=e.name;
  document.getElementById('pMeta').textContent=RINGS[e.ring].label+' ago · '+e.type+' decay';
  document.getElementById('pTags').innerHTML=
    '<span class="p-tag">'+e.type+'</span><span class="p-tag">'+e.space+'</span><span class="p-tag">'+RINGS[e.ring].label+'</span>';
  document.getElementById('panel').classList.add('show');
}
function closePanel(){
  document.getElementById('panel').classList.remove('show');
}
document.getElementById('panelClose').addEventListener('click', closePanel);

// ─────────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────────
let activeFilter='all';
document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeFilter=btn.dataset.lobe;
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    for(const mesh of nodeMeshes){
      const match=activeFilter==='all'||mesh.userData.entry.space===activeFilter;
      mesh.userData.glowMat.opacity = match ? mesh.userData.alpha : mesh.userData.alpha*.08;
    }
    for(const name of LOBE_NAMES){
      const match=activeFilter==='all'||name===activeFilter;
      lobeSprites[name].material.opacity = match ? lobeSprites[name]._baseOpacity : lobeSprites[name]._baseOpacity*.08;
    }
    shellMat.uniforms.filterOpacity.value = 1.0;
  });
});

// ─────────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ─────────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*.001;

  // Smooth zoom
  camZ += (targetZ-camZ)*.065;

  // Camera orbit from rotX/rotY
  camera.position.x = Math.sin(rotY)*Math.cos(rotX)*camZ;
  camera.position.y = Math.sin(rotX)*camZ;
  camera.position.z = Math.cos(rotY)*Math.cos(rotX)*camZ;
  camera.lookAt(0,0,0);

  // Lobe breathing
  for(const name of LOBE_NAMES){
    const sp=lobeSprites[name];
    const b=Math.sin(t*sp._speed+sp._phase);
    sp.scale.setScalar(sp._baseSize*(1+b*.065));
    sp.material.opacity=Math.min(.98, sp._baseOpacity*(1+b*.18));
  }

  // Node pulse (single_use and fast decay glow erratically)
  for(const mesh of nodeMeshes){
    const {entry,glowMat,alpha}=mesh.userData;
    let p=1;
    if(entry.type==='single_use') p=.75+Math.sin(t*2.3+mesh.id*.7)*.25;
    else if(entry.type==='fast')  p=.88+Math.sin(t*1.2+mesh.id*.4)*.12;
    glowMat.opacity=Math.min(1, alpha*p);
  }

  renderer.render(scene,camera);
}
animate();
</script>
