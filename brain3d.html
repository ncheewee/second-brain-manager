<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Second Brain — 3D View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06060e;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:#ccd;}
#c{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;}

/* topbar */
#topbar{position:fixed;top:0;left:0;right:0;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;z-index:20;pointer-events:none;}
#topbar h1{font-size:11px;font-weight:600;color:#383858;letter-spacing:.16em;text-transform:uppercase;}
#topbar a{pointer-events:all;color:#383858;text-decoration:none;font-size:11px;transition:color .2s;}
#topbar a:hover{color:#888;}

/* HTML label overlay */
#labels{position:fixed;inset:0;pointer-events:none;z-index:15;}
.lobe-lbl{position:absolute;transform:translate(-50%,-50%);font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;opacity:0;transition:opacity .5s;white-space:nowrap;text-shadow:0 0 12px currentColor;}
.lobe-lbl.on{opacity:.85;}
.node-lbl{position:absolute;transform:translate(-50%,-145%);font-size:13px;font-weight:500;color:rgba(215,215,255,.92);background:rgba(5,5,18,.90);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:5px 12px 6px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .15s;line-height:1.4;}
.node-lbl .nl-sub{display:block;font-size:10px;color:#555;font-weight:400;margin-top:1px;}
.node-lbl.on{opacity:1;}

/* insights panel */
#insights{position:fixed;top:0;left:0;width:276px;height:100vh;padding:54px 17px 17px;display:flex;flex-direction:column;gap:11px;z-index:18;pointer-events:none;background:linear-gradient(to right,rgba(5,5,15,.94) 68%,transparent 100%);}
.ins-head{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#2e2e4a;margin-bottom:1px;}
.ins-card{background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.055);border-radius:10px;padding:10px 12px;}
.ins-card .lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#3a3a58;margin-bottom:5px;}
.ins-card .big{font-size:20px;font-weight:700;line-height:1;margin-bottom:3px;}
.ins-card .sub{font-size:11px;color:#484868;}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.bar-name{font-size:10px;width:56px;text-transform:capitalize;}
.bar-track{flex:1;height:3px;background:#0e0e1e;border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
.bar-n{font-size:10px;color:#383858;width:16px;text-align:right;}
.risk-item{font-size:11px;color:#a07060;margin-bottom:3px;display:flex;align-items:baseline;gap:6px;}
.risk-item span{font-size:10px;color:#484868;}

/* entry detail panel */
#panel{position:fixed;top:50%;right:22px;transform:translateY(-50%);width:228px;background:rgba(6,6,18,.96);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20;}
#panel.on{opacity:1;pointer-events:all;}
#panel .p-head{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.06);}
#panel .p-close{float:right;color:#383858;cursor:pointer;font-size:16px;line-height:1;margin-top:1px;}
#panel .p-close:hover{color:#888;}
#panel .p-sp{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:5px;}
#panel .p-ti{font-size:15px;font-weight:600;color:#dde;line-height:1.3;}
#panel .p-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:7px;}
#panel .p-row{display:flex;justify-content:space-between;align-items:baseline;}
#panel .p-key{font-size:10px;color:#3a3a58;text-transform:uppercase;letter-spacing:.08em;}
#panel .p-val{font-size:11px;color:#8888aa;}
#panel .p-foot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.05);}
#panel .p-link{font-size:11px;color:#6655bb;cursor:pointer;text-decoration:none;}
#panel .p-link:hover{color:#9988ee;}
#panel .p-bar{width:100%;height:2px;background:#0e0e1e;border-radius:2px;margin-bottom:10px;overflow:hidden;}
#panel .p-bar-fill{height:100%;border-radius:2px;}

/* bottom controls */
#bottom{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;z-index:20;}
.fbtn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:4px 12px;font-size:11px;color:#55556a;cursor:pointer;transition:all .2s;letter-spacing:.05em;font-family:inherit;}
.fbtn:hover{background:rgba(255,255,255,.09);color:#aaa;}
.fbtn.on{color:#ccd;border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.10);}
#resumeBtn{display:none;background:rgba(80,70,160,.12);border:1px solid rgba(100,90,190,.28);color:#7766bb;padding:4px 14px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;}
#resumeBtn:hover{background:rgba(80,70,160,.22);color:#aa99dd;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="labels"></div>

<div id="topbar">
  <h1>Second Brain · 3D</h1>
  <a href="index.html">← Manager</a>
</div>

<div id="insights">
  <div class="ins-head">Brain State</div>
  <div class="ins-card" id="ic-active"></div>
  <div class="ins-card" id="ic-density"></div>
  <div class="ins-card" id="ic-risk"></div>
  <div class="ins-card" id="ic-ever"></div>
</div>

<div id="panel">
  <div class="p-head">
    <span class="p-close" id="pClose">×</span>
    <div class="p-sp" id="pSp"></div>
    <div class="p-ti" id="pTi"></div>
  </div>
  <div class="p-body">
    <div class="p-bar"><div class="p-bar-fill" id="pDepthBar"></div></div>
    <div class="p-row"><span class="p-key">Age</span><span class="p-val" id="pAge"></span></div>
    <div class="p-row"><span class="p-key">Decay</span><span class="p-val" id="pDecay"></span></div>
    <div class="p-row"><span class="p-key">Depth</span><span class="p-val" id="pDepth"></span></div>
    <div class="p-row"><span class="p-key">Perishability</span><span class="p-val" id="pPerish"></span></div>
  </div>
  <div class="p-foot">
    <a class="p-link" id="pLink">Open in Manager ↗</a>
  </div>
</div>

<div id="bottom">
  <button id="resumeBtn">↺ Resume</button>
  <button class="fbtn on" data-f="all">All</button>
  <button class="fbtn" data-f="work">Work</button>
  <button class="fbtn" data-f="personal">Personal</button>
  <button class="fbtn" data-f="family">Family</button>
  <button class="fbtn" data-f="leisure">Leisure</button>
  <button class="fbtn" data-f="core">Core</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
const BR = 10;

const LOBES = {
  work:    {color:0x6655c2,rgb:[102,85,194], activation:.85,phase:0.0, seeds:[[.70,.20,.50],[.50,-.20,.80],[.80,.50,.10],[.30,.40,.70]]},
  personal:{color:0x28a87a,rgb:[40,168,122], activation:.55,phase:1.1, seeds:[[-.60,.30,.50],[-.50,.50,.40],[-.70,.00,.45]]},
  family:  {color:0xcc6040,rgb:[204,96,64],  activation:.38,phase:2.3, seeds:[[.40,-.60,.40],[.65,-.38,-.22]]},
  leisure: {color:0x4090cc,rgb:[64,144,204], activation:.32,phase:3.7, seeds:[[-.40,-.58,.32],[-.52,-.42,-.32]]},
  core:    {color:0x9990ee,rgb:[153,144,238],activation:.72,phase:0.8, seeds:[[-.08,.55,-.72]]}
};
const LOBE_NAMES = Object.keys(LOBES);

function vN(v){const l=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])||1;return[v[0]/l,v[1]/l,v[2]/l];}
function vAN(arr){const s=[0,0,0];arr.forEach(v=>{s[0]+=v[0];s[1]+=v[1];s[2]+=v[2];});return vN([s[0]/arr.length,s[1]/arr.length,s[2]/arr.length]);}

for(const n of LOBE_NAMES){
  LOBES[n].seedsN   = LOBES[n].seeds.map(vN);
  LOBES[n].centroid = vAN(LOBES[n].seeds);
  LOBES[n].hex      = '#'+new THREE.Color(LOBES[n].color).getHexString();
}

const RINGS=[
  {label:'2 days',  r:.965},{label:'1 week', r:.905},{label:'3 weeks',r:.840},
  {label:'2 months',r:.755},{label:'4 months',r:.650},{label:'8 months',r:.525},
  {label:'1.5 yrs', r:.390},{label:'4 years', r:.250},{label:'10+ yrs', r:.115}
];
const PALPHA={evergreen:0.88,slow:0.60,fast:0.38,single_use:0.22};
const PSIZE ={evergreen:0.22,slow:0.17,fast:0.14,single_use:0.11};
const DECAY_LABEL={evergreen:'Never decays',slow:'Slow decay',fast:'Fast decay',single_use:'One-time use'};

const ENTRIES=[
  {name:'Anniversary Trip',      space:'leisure', ring:0,type:'single_use'},
  {name:'Shanghai Masters',      space:'leisure', ring:0,type:'single_use'},
  {name:'Coca-Cola Outcome',     space:'work',    ring:1,type:'fast'},
  {name:'Motorcycle Choice',     space:'personal',ring:1,type:'slow'},
  {name:'BMW COE',               space:'personal',ring:2,type:'fast'},
  {name:'Cost of Living',        space:'personal',ring:2,type:'slow'},
  {name:'South Korea',           space:'leisure', ring:2,type:'fast'},
  {name:'Career Transition',     space:'work',    ring:2,type:'slow'},
  {name:'Second Brain Security', space:'core',    ring:2,type:'slow'},
  {name:'Weekly Codex Scan',     space:'core',    ring:2,type:'fast'},
  {name:'100 Ideas',             space:'personal',ring:3,type:'slow'},
  {name:'Technical Environment', space:'work',    ring:3,type:'slow'},
  {name:'Local LLM',             space:'work',    ring:3,type:'slow'},
  {name:'Cheryl',                space:'personal',ring:3,type:'evergreen'},
  {name:'Ryan',                  space:'family',  ring:3,type:'slow'},
  {name:'Jake',                  space:'family',  ring:3,type:'slow'},
  {name:'InspectPro',            space:'work',    ring:4,type:'slow'},
  {name:'SplitLah',              space:'work',    ring:4,type:'slow'},
  {name:'CV Design',             space:'work',    ring:4,type:'fast'},
  {name:'Evenings Out',          space:'leisure', ring:4,type:'fast'},
  {name:'Motorcycle Touring',    space:'leisure', ring:4,type:'slow'},
  {name:'Music',                 space:'leisure', ring:4,type:'slow'},
  {name:'EnigmaPrint',           space:'work',    ring:4,type:'slow'},
  {name:'Health',                space:'personal',ring:4,type:'evergreen'},
  {name:'How I Build',           space:'work',    ring:5,type:'evergreen'},
  {name:'MetrIQ',                space:'work',    ring:5,type:'slow'},
  {name:'FM Industry',           space:'work',    ring:5,type:'slow'},
  {name:'On Investments',        space:'personal',ring:5,type:'slow'},
  {name:'How I Roll',            space:'personal',ring:5,type:'evergreen'},
  {name:'Travel',                space:'leisure', ring:5,type:'slow'},
  {name:'Inner Circle A',        space:'personal',ring:5,type:'evergreen'},
  {name:'Inner Circle B',        space:'personal',ring:5,type:'evergreen'},
  {name:'Personal Working Style',space:'work',    ring:5,type:'evergreen'},
  {name:'Mapletree VP',          space:'work',    ring:6,type:'slow'},
  {name:'Mount Kinabalu',        space:'leisure', ring:6,type:'slow'},
  {name:'Career Arc',            space:'core',    ring:8,type:'evergreen'},
  {name:'Core Values',           space:'core',    ring:8,type:'evergreen'}
];

// ══════════════════════════════════════════════════════════
// INSIGHTS
// ══════════════════════════════════════════════════════════
(function(){
  const cnt={};
  for(const n of LOBE_NAMES) cnt[n]={total:0,recent:0,sumRing:0};
  for(const e of ENTRIES){
    cnt[e.space].total++;
    cnt[e.space].sumRing+=e.ring;
    if(e.ring<=2) cnt[e.space].recent++;
  }
  const maxT=Math.max(...LOBE_NAMES.map(n=>cnt[n].total));
  const most=[...LOBE_NAMES].sort((a,b)=>cnt[b].recent-cnt[a].recent)[0];
  const atRisk=ENTRIES.filter(e=>(e.type==='single_use'||e.type==='fast')&&e.ring>=4);
  const evTotal=ENTRIES.filter(e=>e.type==='evergreen').length;
  const deepest=[...LOBE_NAMES].sort((a,b)=>(cnt[b].sumRing/cnt[b].total)-(cnt[a].sumRing/cnt[a].total))[0];

  document.getElementById('ic-active').innerHTML=`<div class="lbl">Most Active Space</div>
    <div class="big" style="color:${LOBES[most].hex}">${most}</div>
    <div class="sub">${cnt[most].recent} entries in last 3 weeks</div>`;

  let bars=`<div class="lbl">Memory Density</div>`;
  for(const n of LOBE_NAMES){
    const pct=Math.round(cnt[n].total/maxT*100);
    bars+=`<div class="bar-row"><div class="bar-name" style="color:${LOBES[n].hex}">${n}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${LOBES[n].hex}44;border-right:2px solid ${LOBES[n].hex}88"></div></div>
      <div class="bar-n">${cnt[n].total}</div></div>`;
  }
  document.getElementById('ic-density').innerHTML=bars;

  let riskHTML=`<div class="lbl">Fading Fast</div>`;
  if(!atRisk.length) riskHTML+=`<div class="sub">None at risk ✓</div>`;
  else {
    atRisk.slice(0,3).forEach(e=>{riskHTML+=`<div class="risk-item">${e.name}<span>${RINGS[e.ring].label}</span></div>`;});
    if(atRisk.length>3) riskHTML+=`<div class="sub">+${atRisk.length-3} more</div>`;
  }
  document.getElementById('ic-risk').innerHTML=riskHTML;
  document.getElementById('ic-ever').innerHTML=`<div class="lbl">Evergreen Knowledge</div>
    <div class="big">${evTotal}</div>
    <div class="sub">Deepest: <span style="color:${LOBES[deepest].hex}">${deepest}</span></div>`;
})();

// ══════════════════════════════════════════════════════════
// THREE.JS
// ══════════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x06060e,1);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,300);
camera.position.set(0,0,28);

scene.add(new THREE.AmbientLight(0xffffff,.35));
const pt=new THREE.PointLight(0x8877ee,.45,90);
pt.position.set(10,10,14); scene.add(pt);

// Faint sphere wireframe only — no BackSide halo
const wireMat=new THREE.MeshBasicMaterial({wireframe:true,transparent:true,depthWrite:false,color:0x222266,opacity:.045});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(BR,20,12),wireMat));

// ── Lobe glow volumes ──────────────────────────────────────
function makeGlowTex(r,g,b){
  const S=256,cv=document.createElement('canvas');cv.width=S;cv.height=S;
  const ctx=cv.getContext('2d');
  const gr=ctx.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2);
  gr.addColorStop(0,  `rgba(${r},${g},${b},.80)`);
  gr.addColorStop(.30,`rgba(${r},${g},${b},.36)`);
  gr.addColorStop(.62,`rgba(${r},${g},${b},.08)`);
  gr.addColorStop(1,  `rgba(${r},${g},${b},.00)`);
  ctx.fillStyle=gr;ctx.fillRect(0,0,S,S);
  return new THREE.CanvasTexture(cv);
}

const lobeGlow={};
for(const name of LOBE_NAMES){
  const L=LOBES[name];
  const mat=new THREE.SpriteMaterial({
    map:makeGlowTex(...L.rgb),transparent:true,
    blending:THREE.AdditiveBlending,depthWrite:false,
    opacity:.32+L.activation*.18
  });
  const sp=new THREE.Sprite(mat);
  const c=L.centroid, rr=BR*(.36+L.activation*.13);
  sp.position.set(c[0]*rr,c[1]*rr,c[2]*rr);
  const sz=BR*(1.45+L.activation*.48);
  sp.scale.setScalar(sz);
  sp._base={op:.32+L.activation*.18, sz};
  sp._spd=2*Math.PI/(2.6+(1-L.activation)*5.4);
  sp._ph=L.phase;
  lobeGlow[name]=sp; scene.add(sp);
}

// ── Nodes ─────────────────────────────────────────────────
function makeNodeTex(r,g,b){
  const S=64,cv=document.createElement('canvas');cv.width=S;cv.height=S;
  const ctx=cv.getContext('2d');
  const gr=ctx.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2);
  gr.addColorStop(0,  `rgba(${r},${g},${b},1.0)`);
  gr.addColorStop(.20,`rgba(${r},${g},${b},.75)`);
  gr.addColorStop(.55,`rgba(${r},${g},${b},.18)`);
  gr.addColorStop(1,  `rgba(${r},${g},${b},.00)`);
  ctx.fillStyle=gr;ctx.fillRect(0,0,S,S);
  return new THREE.CanvasTexture(cv);
}

function uh(n){let x=n^(n>>>16);x=Math.imul(x,0x45d9f3b);x^=x>>>16;return(x>>>0)/4294967295;}
function coneDir(seed,deg,idx){
  const[sx,sy,sz]=seed;
  const th=Math.acos(Math.max(-1,Math.min(1,1-uh(idx*7+1)*(1-Math.cos(deg*Math.PI/180)))));
  const ph=uh(idx*13+3)*2*Math.PI;
  const up=Math.abs(sx)<.9?[0,1,0]:[1,0,0];
  let tx=up[1]*sz-up[2]*sy,ty=up[2]*sx-up[0]*sz,tz=up[0]*sy-up[1]*sx;
  const tl=Math.sqrt(tx*tx+ty*ty+tz*tz)||1; tx/=tl;ty/=tl;tz/=tl;
  const bx=sy*tz-sz*ty,by=sz*tx-sx*tz,bz=sx*ty-sy*tx;
  const st=Math.sin(th),ct=Math.cos(th),sp2=Math.sin(ph),cp=Math.cos(ph);
  return vN([tx*st*cp+bx*st*sp2+sx*ct, ty*st*cp+by*st*sp2+sy*ct, tz*st*cp+bz*st*sp2+sz*ct]);
}

const nodeMeshes=[];
const nodeTex={};
for(const n of LOBE_NAMES) nodeTex[n]=makeNodeTex(...LOBES[n].rgb);

let gIdx=0;
for(const name of LOBE_NAMES){
  const L=LOBES[name];
  ENTRIES.filter(e=>e.space===name).forEach((e,i)=>{
    const seed=L.seedsN[i%L.seedsN.length];
    const dir=coneDir(seed,30,gIdx++);
    const rr=RINGS[e.ring].r*BR;
    const alpha=PALPHA[e.type], nsz=PSIZE[e.type];

    const gMat=new THREE.SpriteMaterial({map:nodeTex[name],transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:alpha});
    const gSp=new THREE.Sprite(gMat);
    gSp.position.set(dir[0]*rr,dir[1]*rr,dir[2]*rr);
    gSp.scale.setScalar(nsz*BR); scene.add(gSp);

    const hit=new THREE.Mesh(new THREE.SphereGeometry(nsz*.48*BR,5,3),new THREE.MeshBasicMaterial({visible:false}));
    hit.position.copy(gSp.position);
    hit.userData={entry:e,mat:gMat,alpha,sprite:gSp};
    scene.add(hit); nodeMeshes.push(hit);
  });
}

// ── HTML labels ───────────────────────────────────────────
const labelsDiv=document.getElementById('labels');
const lobeLbls={};
for(const name of LOBE_NAMES){
  const el=document.createElement('div');
  el.className='lobe-lbl'; el.textContent=name; el.style.color=LOBES[name].hex;
  labelsDiv.appendChild(el); lobeLbls[name]=el;
}
const nodeLbl=document.createElement('div');
nodeLbl.className='node-lbl'; labelsDiv.appendChild(nodeLbl);

function project(wp){
  const v=wp.clone(); v.project(camera);
  return{x:(v.x+1)/2*innerWidth, y:-(v.y-1)/2*innerHeight};
}

// ══════════════════════════════════════════════════════════
// INTERACTION — momentum rotation
// ══════════════════════════════════════════════════════════
let autoRotate=true;
let rotX=.18, rotY=0;
let velX=0, velY=0;           // angular velocity (rad/frame)
let camZ=28, targetZ=28;
let isDrag=false, lastX=0, lastY=0, didDrag=false;
let activeFilter='all', hoveredSpace=null;

const AUTO_VEL   = 0.0032;    // target auto-rotate speed
const FRICTION   = 0.88;      // velocity decay when released
const DRAG_GAIN  = 0.006;     // mouse→velocity gain

const resumeBtn=document.getElementById('resumeBtn');
resumeBtn.addEventListener('click',()=>{autoRotate=true;resumeBtn.style.display='none';});

function stopAuto(){
  if(!autoRotate) return;
  autoRotate=false; resumeBtn.style.display='block';
}

canvas.addEventListener('mousedown',e=>{
  isDrag=true; lastX=e.clientX; lastY=e.clientY; didDrag=false;
  stopAuto();
});
window.addEventListener('mousemove',e=>{
  if(isDrag){
    const dx=e.clientX-lastX, dy=e.clientY-lastY;
    if(Math.abs(dx)+Math.abs(dy)>1) didDrag=true;
    velY+=dx*DRAG_GAIN;   // accumulate impulse
    velX+=dy*DRAG_GAIN;
    lastX=e.clientX; lastY=e.clientY;
  } else {
    doHover(e.clientX,e.clientY);
  }
});
window.addEventListener('mouseup',e=>{
  if(isDrag&&!didDrag) doClick(e.clientX,e.clientY);
  isDrag=false;
  // velocity carries on, friction takes over
});
canvas.addEventListener('wheel',e=>{
  targetZ=Math.max(14,Math.min(50,targetZ+e.deltaY*.04));
},{passive:true});

let tX=0,tY=0;
canvas.addEventListener('touchstart',e=>{tX=e.touches[0].clientX;tY=e.touches[0].clientY;stopAuto();},{passive:true});
canvas.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-tX,dy=e.touches[0].clientY-tY;
  velY+=dx*DRAG_GAIN; velX+=dy*DRAG_GAIN;
  tX=e.touches[0].clientX; tY=e.touches[0].clientY;
},{passive:true});

const ray=new THREE.Raycaster();
function getHit(cx,cy){
  const rect=canvas.getBoundingClientRect();
  ray.setFromCamera(new THREE.Vector2(((cx-rect.left)/rect.width)*2-1,-((cy-rect.top)/rect.height)*2+1),camera);
  const hits=ray.intersectObjects(nodeMeshes);
  return hits.length?hits[0].object:null;
}

function applyFilter(){
  for(const m of nodeMeshes){
    const vis=activeFilter==='all'||m.userData.entry.space===activeFilter;
    m.userData.mat.opacity=vis?m.userData.alpha:m.userData.alpha*.06;
  }
  for(const n of LOBE_NAMES){
    const vis=activeFilter==='all'||n===activeFilter;
    lobeGlow[n].material.opacity=vis?lobeGlow[n]._base.op:lobeGlow[n]._base.op*.06;
  }
}

function doHover(cx,cy){
  const hit=getHit(cx,cy);
  if(hit){
    const e=hit.userData.entry;
    canvas.style.cursor='pointer';
    if(hoveredSpace!==e.space){
      hoveredSpace=e.space;
      for(const m of nodeMeshes){
        const same=m.userData.entry.space===e.space;
        const vis=activeFilter==='all'||m.userData.entry.space===activeFilter;
        m.userData.mat.opacity=(same&&vis)?m.userData.alpha:m.userData.alpha*.07;
      }
    }
    const sc=project(hit.position);
    nodeLbl.style.left=sc.x+'px'; nodeLbl.style.top=sc.y+'px';
    nodeLbl.innerHTML=`${e.name}<span class="nl-sub">${RINGS[e.ring].label} ago · ${e.type}</span>`;
    nodeLbl.classList.add('on');
  } else {
    canvas.style.cursor='default';
    if(hoveredSpace){hoveredSpace=null; applyFilter();}
    nodeLbl.classList.remove('on');
  }
}

function doClick(cx,cy){
  const hit=getHit(cx,cy);
  if(hit) showPanel(hit); else document.getElementById('panel').classList.remove('on');
}

function showPanel(hit){
  const e=hit.userData.entry, L=LOBES[e.space];
  document.getElementById('pSp').textContent=e.space;
  document.getElementById('pSp').style.color=L.hex;
  document.getElementById('pTi').textContent=e.name;
  document.getElementById('pAge').textContent=RINGS[e.ring].label+' ago';
  document.getElementById('pDecay').textContent=DECAY_LABEL[e.type];
  document.getElementById('pDepth').textContent='Layer '+(e.ring+1)+' of '+RINGS.length;
  document.getElementById('pPerish').textContent=e.type;
  // Depth bar: ring 0 = full (surface), ring 8 = near-empty (deep core)
  const depthPct=Math.round((1-e.ring/8)*100);
  document.getElementById('pDepthBar').style.width=depthPct+'%';
  document.getElementById('pDepthBar').style.background=L.hex+'88';
  document.getElementById('pLink').href='index.html?entry='+encodeURIComponent(e.name);
  document.getElementById('panel').classList.add('on');
}
document.getElementById('pClose').addEventListener('click',()=>document.getElementById('panel').classList.remove('on'));

document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeFilter=btn.dataset.f;
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    hoveredSpace=null; applyFilter();
  });
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ══════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*.001;

  // ── Velocity / momentum ──
  if(autoRotate){
    // Ease velocity toward auto speed (smooth start)
    velY += (AUTO_VEL - velY) * 0.04;
    velX += (0 - velX) * 0.04;
  } else if(!isDrag){
    // Friction decay (smooth stop)
    velY *= FRICTION;
    velX *= FRICTION;
  }
  // Clamp and apply
  rotY += velY;
  rotX += velX;
  rotX = Math.max(-1.4, Math.min(1.4, rotX));

  camZ += (targetZ-camZ)*.065;
  camera.position.x = Math.sin(rotY)*Math.cos(rotX)*camZ;
  camera.position.y = Math.sin(rotX)*camZ;
  camera.position.z = Math.cos(rotY)*Math.cos(rotX)*camZ;
  camera.lookAt(0,0,0);

  // ── Lobe breathing only (no zone highlights) ──
  for(const name of LOBE_NAMES){
    const sp=lobeGlow[name];
    const breath=Math.sin(t*sp._spd+sp._ph);
    const vis=activeFilter==='all'||name===activeFilter;
    sp.scale.setScalar(sp._base.sz*(1+breath*.07));
    sp.material.opacity=Math.min(.88, sp._base.op*(1+breath*.22)*(vis?1:.06));
  }

  // ── Node pulse (single_use / fast flicker) ──
  if(!hoveredSpace){
    for(const m of nodeMeshes){
      const{entry,mat,alpha}=m.userData;
      const vis=activeFilter==='all'||entry.space===activeFilter;
      if(!vis){mat.opacity=alpha*.06;continue;}
      let p=1;
      if(entry.type==='single_use') p=.65+Math.sin(t*2.5+m.id*.9)*.35;
      else if(entry.type==='fast')  p=.82+Math.sin(t*1.4+m.id*.5)*.18;
      mat.opacity=Math.min(1,alpha*p);
    }
  }

  // ── HTML lobe labels ──
  const toCamera=camera.position.clone().normalize();
  for(const name of LOBE_NAMES){
    const c=LOBES[name].centroid;
    const dot=toCamera.x*c[0]+toCamera.y*c[1]+toCamera.z*c[2];
    const show=dot>0.30&&(activeFilter==='all'||activeFilter===name);
    const el=lobeLbls[name];
    if(show){
      const wp=new THREE.Vector3(c[0],c[1],c[2]).multiplyScalar(BR*1.06);
      const sc=project(wp);
      el.style.left=sc.x+'px'; el.style.top=sc.y+'px';
      el.classList.add('on');
    } else { el.classList.remove('on'); }
  }

  renderer.render(scene,camera);
}
animate();
</script>
