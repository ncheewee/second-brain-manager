<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain — 3D View</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #e8e8f0; font-family: 'IBM Plex Sans', system-ui, sans-serif; overflow: hidden; height: 100vh; }
#canvas-wrap { position: fixed; inset: 0; }
canvas { display: block; width: 100%; height: 100%; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; pointer-events: none; }
#header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; }
#header-left { display: flex; align-items: baseline; gap: 10px; }
#header-title { font-size: 1rem; font-weight: 500; color: #e8e8f0; letter-spacing: -.01em; }
#header-sub { font-size: .72rem; color: #686880; }
#header-right { pointer-events: all; display: flex; gap: 8px; }
.hud-btn { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); color: #a8a8c0; font-size: .72rem; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; transition: background .15s; }
.hud-btn:hover { background: rgba(255,255,255,.12); color: #e8e8f0; }
.hud-btn.active { background: rgba(120,100,220,.25); border-color: rgba(120,100,220,.5); color: #c0b0ff; }

/* Legend */
#legend { position: fixed; bottom: 24px; left: 24px; display: flex; flex-direction: column; gap: 6px; }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: .72rem; color: #a8a8c0; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* Tooltip */
#tooltip { position: fixed; pointer-events: none; background: rgba(16,16,28,.92); border: 1px solid rgba(255,255,255,.12); border-radius: 8px; padding: 10px 14px; max-width: 220px; opacity: 0; transition: opacity .15s; backdrop-filter: blur(8px); }
#tooltip-title { font-size: .82rem; font-weight: 500; color: #e8e8f0; margin-bottom: 3px; }
#tooltip-meta { font-size: .72rem; color: #686880; line-height: 1.5; }

/* Stats bar */
#stats { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 6px; text-align: right; }
.stat { font-size: .7rem; color: #686880; }
.stat span { color: #a8a8c0; font-weight: 500; }

/* Instruction */
#instructions { position: fixed; bottom: 70px; right: 24px; font-size: .68rem; color: #444460; text-align: right; line-height: 1.7; }

#back-link { pointer-events: all; }
</style>
</head>
<body>

<div id="canvas-wrap"><canvas id="c"></canvas></div>

<div id="hud">
  <div id="header">
    <div id="header-left">
      <div id="header-title">Second Brain</div>
      <div id="header-sub">3D view · 37 entries</div>
    </div>
    <div id="header-right">
      <button class="hud-btn active" id="btn-all" onclick="filterSpace('all')">All</button>
      <button class="hud-btn" id="btn-core" onclick="filterSpace('core')">Core</button>
      <button class="hud-btn" id="btn-work" onclick="filterSpace('work')">Work</button>
      <button class="hud-btn" id="btn-personal" onclick="filterSpace('personal')">Personal</button>
      <button class="hud-btn" id="btn-family" onclick="filterSpace('family')">Family</button>
      <button class="hud-btn" id="btn-leisure" onclick="filterSpace('leisure')">Leisure</button>
      <a id="back-link" href="context-manager-v05.html" class="hud-btn">← Manager</a>
    </div>
  </div>
</div>

<div id="legend">
  <div class="legend-row"><div class="legend-dot" style="background:#9090ff"></div>core</div>
  <div class="legend-row"><div class="legend-dot" style="background:#7866d4"></div>work</div>
  <div class="legend-row"><div class="legend-dot" style="background:#2fba8a"></div>personal</div>
  <div class="legend-row"><div class="legend-dot" style="background:#e0704a"></div>family</div>
  <div class="legend-row"><div class="legend-dot" style="background:#4a9fe0"></div>leisure</div>
  <div class="legend-row" style="margin-top:6px"><div class="legend-dot" style="background:#e8e8f0;width:5px;height:5px"></div><span style="color:#686880">node size = activation</span></div>
</div>

<div id="tooltip">
  <div id="tooltip-title"></div>
  <div id="tooltip-meta"></div>
</div>

<div id="stats">
  <div class="stat">Active entries <span>37</span></div>
  <div class="stat">Spaces <span>5</span></div>
  <div class="stat">Telemetry <span style="color:#2fba8a">live</span></div>
</div>

<div id="instructions">drag to rotate · scroll to zoom · hover nodes</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const ENTRIES = [
  { title:'Career Arc', space:'core', layer:'artifact', activation:3, perishability:'evergreen' },
  { title:'Core Values', space:'core', layer:'behavioural', activation:3, perishability:'evergreen' },
  { title:'Personal Working Style', space:'core', layer:'behavioural', activation:2, perishability:'evergreen' },
  { title:'How I Build', space:'work', layer:'workflow', activation:2, perishability:'slow' },
  { title:'Career Transition Target', space:'work', layer:'artifact', activation:2, perishability:'fast' },
  { title:'100 Ideas Portfolio', space:'work', layer:'artifact', activation:2, perishability:'slow' },
  { title:'InspectPro', space:'work', layer:'artifact', activation:1, perishability:'slow' },
  { title:'MetrIQ', space:'work', layer:'artifact', activation:1, perishability:'slow' },
  { title:'SplitLah', space:'work', layer:'artifact', activation:1, perishability:'slow' },
  { title:'Mapletree VP Experience', space:'work', layer:'artifact', activation:2, perishability:'slow' },
  { title:'Coca-Cola Outcome', space:'work', layer:'artifact', activation:1, perishability:'fast' },
  { title:'FM Industry Focus', space:'work', layer:'domain', activation:1, perishability:'slow' },
  { title:'Technical Environment', space:'work', layer:'domain', activation:1, perishability:'slow' },
  { title:'Local LLM Infrastructure', space:'work', layer:'domain', activation:1, perishability:'slow' },
  { title:'Second Brain Security', space:'work', layer:'workflow', activation:1, perishability:'slow' },
  { title:'Weekly Codex Scan', space:'work', layer:'workflow', activation:1, perishability:'slow' },
  { title:'CV Design Framework', space:'work', layer:'domain', activation:1, perishability:'slow' },
  { title:'On investments', space:'personal', layer:'domain', activation:1, perishability:'slow' },
  { title:'Motorcycle Choice', space:'personal', layer:'domain', activation:1, perishability:'fast' },
  { title:'Mount Kinabalu', space:'personal', layer:'artifact', activation:1, perishability:'evergreen' },
  { title:'BMW COE Renewal', space:'personal', layer:'domain', activation:1, perishability:'fast' },
  { title:'Anniversary Trip', space:'personal', layer:'domain', activation:1, perishability:'single_use' },
  { title:'How I roll outside work', space:'personal', layer:'behavioural', activation:1, perishability:'slow' },
  { title:'Evenings Out', space:'personal', layer:'behavioural', activation:1, perishability:'slow' },
  { title:'Cost of Living 2026', space:'personal', layer:'domain', activation:0, perishability:'fast' },
  { title:'Health & Exercise', space:'personal', layer:'behavioural', activation:1, perishability:'slow' },
  { title:'Shanghai Masters', space:'personal', layer:'domain', activation:0, perishability:'single_use' },
  { title:'Inner Circle', space:'family', layer:'artifact', activation:1, perishability:'evergreen' },
  { title:'Inner Circle Full', space:'family', layer:'artifact', activation:1, perishability:'evergreen' },
  { title:'Cheryl', space:'family', layer:'artifact', activation:1, perishability:'slow' },
  { title:'Ryan', space:'family', layer:'artifact', activation:1, perishability:'slow' },
  { title:'Jake', space:'family', layer:'artifact', activation:1, perishability:'slow' },
  { title:'Motorcycle Touring', space:'leisure', layer:'domain', activation:1, perishability:'slow' },
  { title:'Travel', space:'leisure', layer:'domain', activation:1, perishability:'slow' },
  { title:'South Korea Dec', space:'leisure', layer:'artifact', activation:0, perishability:'fast' },
  { title:'Music / Evenings', space:'leisure', layer:'behavioural', activation:1, perishability:'slow' },
  { title:'EnigmaPrint', space:'work', layer:'artifact', activation:0, perishability:'slow' },
];

const SPACE_COLORS = {
  core:    0x9090ff,
  work:    0x7866d4,
  personal:0x2fba8a,
  family:  0xe0704a,
  leisure: 0x4a9fe0,
};

const SPACE_CENTERS = {
  core:    { x: 0, y: 0, z: 0 },
  work:    { x: 5, y: 1, z: -2 },
  personal:{ x:-4, y:-1, z: 2 },
  family:  { x: 1, y: 4, z: 3 },
  leisure: { x:-1, y:-4, z:-4 },
};

// Scene setup
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0a0a0f, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.045);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 22);

// Ambient + point lights
scene.add(new THREE.AmbientLight(0x8888cc, 0.4));
const pt1 = new THREE.PointLight(0x9090ff, 1.5, 40);
pt1.position.set(0, 8, 5);
scene.add(pt1);
const pt2 = new THREE.PointLight(0x2fba8a, 1.2, 30);
pt2.position.set(-8, -5, -2);
scene.add(pt2);

// Background particles
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 800; i++) {
  starVerts.push((Math.random()-0.5)*120, (Math.random()-0.5)*120, (Math.random()-0.5)*120);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0x334455, size:0.08 })));

// Connection lines between entries in same space
const lineMat = new THREE.LineBasicMaterial({ color:0x334466, opacity:0.25, transparent:true });

// Build nodes
const nodeMeshes = [];
const nodePositions = [];

function buildNodes(filterSpc) {
  // Remove old nodes and lines
  nodeMeshes.forEach(m => scene.remove(m));
  nodeMeshes.length = 0;
  scene.children.filter(c => c.isLine).forEach(l => scene.remove(l));

  const visible = ENTRIES.filter(e => filterSpc === 'all' || e.space === filterSpc);

  const spaceNodes = {};
  visible.forEach((entry, i) => {
    const center = SPACE_CENTERS[entry.space];
    const radius = 2.5 + Math.random() * 1.8;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const x = center.x + radius * Math.sin(phi) * Math.cos(theta);
    const y = center.y + radius * Math.sin(phi) * Math.sin(theta);
    const z = center.z + radius * Math.cos(phi);

    const size = entry.activation === 3 ? 0.32 : entry.activation === 2 ? 0.22 : entry.activation === 1 ? 0.15 : 0.1;
    const geo = new THREE.SphereGeometry(size, 16, 16);
    const mat = new THREE.MeshPhongMaterial({
      color: SPACE_COLORS[entry.space],
      emissive: SPACE_COLORS[entry.space],
      emissiveIntensity: entry.activation >= 2 ? 0.5 : 0.2,
      shininess: 80,
      transparent: true,
      opacity: filterSpc === 'all' || entry.space === filterSpc ? 1 : 0.15,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.userData = { entry, baseY: y, phase: Math.random() * Math.PI * 2 };
    scene.add(mesh);
    nodeMeshes.push(mesh);
    nodePositions.push(new THREE.Vector3(x, y, z));

    if (!spaceNodes[entry.space]) spaceNodes[entry.space] = [];
    spaceNodes[entry.space].push(new THREE.Vector3(x, y, z));
  });

  // Draw intra-space lines (connect first 3 within each space)
  Object.values(spaceNodes).forEach(pts => {
    for (let i = 0; i < pts.length - 1 && i < 4; i++) {
      const geo = new THREE.BufferGeometry().setFromPoints([pts[i], pts[i+1]]);
      const line = new THREE.Line(geo, lineMat);
      line.isLine = true;
      scene.add(line);
    }
  });
}

buildNodes('all');

// Orbit controls (manual — no external dep needed)
let isDragging = false, lastMouse = { x:0, y:0 };
let rotX = 0.2, rotY = 0;
const pivot = new THREE.Object3D();
scene.add(pivot);

canvas.addEventListener('mousedown', e => { isDragging = true; lastMouse = { x:e.clientX, y:e.clientY }; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (isDragging) {
    rotY += (e.clientX - lastMouse.x) * 0.005;
    rotX += (e.clientY - lastMouse.y) * 0.005;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    lastMouse = { x:e.clientX, y:e.clientY };
  }
  // Tooltip hit-test
  const mx = (e.clientX / window.innerWidth) * 2 - 1;
  const my = -(e.clientY / window.innerHeight) * 2 + 1;
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
  const hits = raycaster.intersectObjects(nodeMeshes);
  const tip = document.getElementById('tooltip');
  if (hits.length > 0) {
    const { entry } = hits[0].object.userData;
    document.getElementById('tooltip-title').textContent = entry.title;
    document.getElementById('tooltip-meta').innerHTML =
      `space: ${entry.space}<br>layer: ${entry.layer}<br>decay: ${entry.perishability}<br>activation: ${'●'.repeat(entry.activation || 0)}${'○'.repeat(3 - (entry.activation || 0))}`;
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
    tip.style.opacity = '1';
  } else {
    tip.style.opacity = '0';
  }
});

canvas.addEventListener('wheel', e => {
  camera.position.z = Math.max(6, Math.min(40, camera.position.z + e.deltaY * 0.02));
  e.preventDefault();
}, { passive: false });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Filter
let activeFilter = 'all';
function filterSpace(spc) {
  activeFilter = spc;
  document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + spc);
  if (btn) btn.classList.add('active');
  buildNodes(spc);
}

// Animate
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.008;

  // Gentle float
  nodeMeshes.forEach(m => {
    m.position.y = m.userData.baseY + Math.sin(t + m.userData.phase) * 0.06;
    m.rotation.y += 0.003;
  });

  // Rotate entire scene
  scene.rotation.y = rotY;
  scene.rotation.x = rotX;

  // Pulse the point light
  pt1.intensity = 1.2 + Math.sin(t * 0.7) * 0.4;

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
